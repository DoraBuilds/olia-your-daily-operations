name: GitHub Pages Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_SITE_URL: ${{ vars.VITE_PUBLIC_SITE_URL }}
          VITE_STRIPE_PRICE_STARTER_MONTHLY: ${{ vars.VITE_STRIPE_PRICE_STARTER_MONTHLY }}
          VITE_STRIPE_PRICE_STARTER_ANNUAL: ${{ vars.VITE_STRIPE_PRICE_STARTER_ANNUAL }}
          VITE_STRIPE_PRICE_GROWTH_MONTHLY: ${{ vars.VITE_STRIPE_PRICE_GROWTH_MONTHLY }}
          VITE_STRIPE_PRICE_GROWTH_ANNUAL: ${{ vars.VITE_STRIPE_PRICE_GROWTH_ANNUAL }}
          VITE_STRIPE_CUSTOMER_PORTAL_URL: ${{ vars.VITE_STRIPE_CUSTOMER_PORTAL_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
