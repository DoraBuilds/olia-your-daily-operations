---
# Flow 05 — Dashboard
# Requires authentication. Run this flow AFTER logging in manually,
# or set OLIA_TEST_EMAIL / OLIA_TEST_PASSWORD environment variables.
#
# To run with credentials:
#   OLIA_TEST_EMAIL=you@email.com OLIA_TEST_PASSWORD=yourpass bun run e2e:nav
#
# Without credentials the app redirects to /kiosk — all assertions are optional.
appId: com.olia.operations
name: "Dashboard — Main Page"

---
- launchApp

- waitForAnimationToEnd

# ── If on kiosk: try to log in as admin ───────────────────────────────────────
- tapOn:
    text: "Launch Kiosk"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Admin"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "your@email.com"
    optional: true
- inputText: "${OLIA_TEST_EMAIL}"
    optional: true

- tapOn:
    text: "Password"
    optional: true
- inputText: "${OLIA_TEST_PASSWORD}"
    optional: true

- tapOn:
    text: "Sign in"
    optional: true

- waitForAnimationToEnd

# ── Dashboard assertions (all optional — only pass when authenticated) ─────────
- assertVisible:
    text: "Good morning"
    optional: true
- assertVisible:
    text: "Good afternoon"
    optional: true
- assertVisible:
    text: "Good evening"
    optional: true
- assertVisible:
    text: "Checklists"
    optional: true
- assertVisible:
    text: "Compliance"
    optional: true

# ── Bottom nav (visible when authenticated) ───────────────────────────────────
- assertVisible:
    text: "Dashboard"
    optional: true
- assertVisible:
    text: "Checklists"
    optional: true
- assertVisible:
    text: "Infohub"
    optional: true

- takeScreenshot: "05-dashboard"
