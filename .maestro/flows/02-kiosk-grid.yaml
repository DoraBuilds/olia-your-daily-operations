---
# Flow 02 — Kiosk Grid Screen
# Navigates through the setup screen (using whichever location is already selected)
# then verifies the agenda grid, stat strip, checklist cards, and footer.
appId: com.olia.operations
name: "Kiosk — Grid Screen"

---
- launchApp:
    clearState: true

- waitForAnimationToEnd

# ── Setup screen ──────────────────────────────────────────────────────────────
- assertVisible:
    text: "Launch Kiosk"

- tapOn:
    text: "Launch Kiosk"

- waitForAnimationToEnd

# ── Grid heading ──────────────────────────────────────────────────────────────
- assertVisible:
    text: "What's on the agenda"

# ── Stat strip ────────────────────────────────────────────────────────────────
- assertVisible:
    text: "Total"
- assertVisible:
    text: "Completed"
- assertVisible:
    text: "Remaining"

# ── Header ────────────────────────────────────────────────────────────────────
- assertVisible:
    text: "Olia"
- assertVisible:
    text: "Admin"

# ── Footer ────────────────────────────────────────────────────────────────────
- assertVisible:
    text: "System Online"

- takeScreenshot: "02-kiosk-grid-screen"
