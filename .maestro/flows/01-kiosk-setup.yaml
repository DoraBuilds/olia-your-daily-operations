---
# Flow 01 — Kiosk Setup Screen
# Verifies the setup screen shell before a checklist run starts.
appId: com.olia.operations
name: "Kiosk — Setup Screen"

---
- launchApp:
    clearState: true

- waitForAnimationToEnd

# Branding
- assertVisible:
    text: "Olia Kiosk"

# Location prompt
- assertVisible:
    text: "Select a location to launch"

# Launch button
- assertVisible:
    text: "Launch Kiosk"

# System Online footer
- assertVisible:
    text: "System Online"

- takeScreenshot: "01-kiosk-setup-screen"
