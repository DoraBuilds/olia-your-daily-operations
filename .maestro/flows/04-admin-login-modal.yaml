---
# Flow 04 — Admin PIN Modal
# Verifies the Admin PIN modal: opens from kiosk grid, shows the PIN form,
# accepts numeric input, and can be closed.
appId: com.olia.operations
name: "Kiosk — Admin PIN Modal"

---
- launchApp:
    clearState: true

- waitForAnimationToEnd

# ── Navigate through setup screen ────────────────────────────────────────────
- tapOn:
    text: "Launch Kiosk"

- waitForAnimationToEnd

# ── Open Admin login modal ────────────────────────────────────────────────────
- assertVisible:
    text: "Admin"

- tapOn:
    text: "Admin"

- waitForAnimationToEnd

# ── Modal assertions ──────────────────────────────────────────────────────────
- assertVisible:
    text: "Admin PIN"
- assertVisible:
    text: "PIN"
- assertVisible:
    text: "Continue"

- takeScreenshot: "04-admin-login-modal-open"

# ── Enter a PIN ───────────────────────────────────────────────────────────────
- tapOn:
    text: "4-digit PIN"
- inputText: "1234"

- tapOn:
    text: "Continue"

- waitForAnimationToEnd

# ── Error message (PIN may be invalid in test env) ────────────────────────────
- assertVisible:
    text: "Invalid PIN."
    optional: true

- takeScreenshot: "04-admin-login-invalid-creds"

# ── Close modal by tapping backdrop (outside card) ────────────────────────────
- tapOn:
    point: "10%, 15%"

- waitForAnimationToEnd

# ── Back on grid ──────────────────────────────────────────────────────────────
- assertVisible:
    text: "What's on the agenda"

- takeScreenshot: "04-admin-login-closed"
